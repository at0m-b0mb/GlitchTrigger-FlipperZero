name: Build FAP

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: [release, dev]
    name: ufbt (${{ matrix.channel }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ufbt
        run: python3 -m pip install --upgrade ufbt

      - name: Sync SDK (${{ matrix.channel }})
        run: ufbt update --channel=${{ matrix.channel }}

      - name: Build Glitch Trigger
        run: ufbt

      - name: Upload .fap
        uses: actions/upload-artifact@v4
        with:
          name: glitch-trigger-fap-${{ matrix.channel }}
          path: dist/*.fap
          if-no-files-found: error
